<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Planner | Polina</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --sidebar-color: #2c3e50;
            --accent-rose: #d4a5a5;
            --accent-blue: #7a94b5;
            --accent-green: #27ae60;
            --cal-bg: #fffcf5;
            --text-main: #333;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-soft: #eee;
            --border-color: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0f2f5 0%, #d9e2e8 100%);
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
        }

        /* SIDEBAR */
        .sidebar { width: 70px; min-width: 70px; background-color: var(--sidebar-color); color: white; padding: 20px 0; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; transition: width 0.3s ease; overflow: hidden; z-index: 1000; }
        .sidebar:hover { width: 180px; }
        .sidebar .nav-item { width: 100%; padding: 12px 25px; display: flex; align-items: center; gap: 20px; white-space: nowrap; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .sidebar .nav-item:hover, .sidebar .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .sidebar .nav-text { font-size: 14px; opacity: 0; transition: opacity 0.2s; }
        .sidebar:hover .nav-text { opacity: 1; }
        .export-btn { margin-top: auto; opacity: 1 !important; color: #3498db !important; font-weight: 600; }

        .main-content-wrapper { flex: 1; display: flex; height: 100vh; overflow: hidden; position: relative; }
        .workspace { flex: 1; padding: 15px 50px; overflow-y: auto; background: transparent; display: flex; flex-direction: column; }
        
        .insights-panel { 
            width: 340px; min-width: 250px; max-width: 600px;
            padding: 30px 20px; background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            overflow-y: auto; 
            scrollbar-width: none; display: flex; flex-direction: column; gap: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: -10px 0 30px rgba(0,0,0,0.03);
        }
        .insights-panel::-webkit-scrollbar { display: none; }
        .resizer { width: 4px; cursor: col-resize; background: transparent; transition: background 0.2s; z-index: 10; }
        .resizer:hover, .resizer.dragging { background: var(--accent-blue); opacity: 0.5; }

        /* GLASS MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
            padding: 35px; border-radius: 30px; width: 500px; display: flex; flex-direction: column; gap: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }
        label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; font-family: inherit; background: rgba(255,255,255,0.5); }

        /* INPUTS */
        .task-input-row { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        #task-name-quick { max-width: 450px; padding: 12px 18px; border: 1px solid rgba(0,0,0,0.05); border-radius: 15px; outline: none; font-family: inherit; flex: 1; font-size: 15px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); }
        .btn-add { background: var(--sidebar-color); color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .btn-pro { background: var(--accent-blue); color: white; border: none; padding: 15px 45px; border-radius: 15px; cursor: pointer; font-size: 15px; font-weight: 600; transition: transform 0.2s; }

        /* CARDS */
        .task-list { display: flex; flex-direction: column; gap: 10px; min-height: 100px; padding: 10px; border-radius: 15px; background: rgba(0,0,0,0.02); border: 1px dashed transparent; }
        .task-list.drag-over { border-color: var(--accent-blue); background: rgba(122, 148, 181, 0.05); }
        .task-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.5); padding: 15px 20px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: grab;
            backdrop-filter: blur(5px);
        }
        .task-card:active { cursor: grabbing; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: var(--accent-blue); }
        .task-info { display: flex; align-items: center; gap: 12px; overflow: hidden; flex: 1; }
        .task-actions { display: flex; gap: 10px; opacity: 0.1; transition: 0.3s; }
        .task-card:hover .task-actions { opacity: 1; }
        .action-icon { cursor: pointer; font-size: 14px; filter: grayscale(1); transition: 0.2s; }
        .action-icon:hover { filter: grayscale(0); transform: scale(1.2); }

        /* GRIDS */
        .status-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin-top: 3px; }
        .freud-grid { grid-template-columns: repeat(7, 1fr); }
        .status-block { width: 18px; height: 18px; border-radius: 4px; background: rgba(0,0,0,0.05); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 7px; color: #888; }
        .status-block.active { background: var(--accent-green); color: white; }
        .status-block.rose { background: var(--accent-rose) !important; color: white; }
        .ferris-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .ferris-grid .status-block { width: 28px; height: 28px; font-size: 10px; }

        #custom-calendar { position: fixed; display: none; width: 280px; background: rgba(255, 252, 245, 0.9); backdrop-filter: blur(20px); border-radius: 22px; box-shadow: 0 15px 50px rgba(0,0,0,0.12); padding: 20px; z-index: 3000; border: 1px solid rgba(255,255,255,0.5); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; font-size: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { padding: 8px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .cal-day:hover { background: var(--accent-rose); color: white; }

        .active-view { display: flex !important; flex-direction: column; height: 100%; }
        .view-content { display: none; }
        .chart-container { background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.3); height: 280px; }
        
        .widget { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.2); }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .sub-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; color: #444; }
        .small-icon { cursor: pointer; opacity: 0.3; transition: 0.3s; font-size: 12px; }
        .small-icon:hover { opacity: 1; }

        h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-bottom: 10px; }
        h1 { font-size: 26px; margin-bottom: 5px; color: var(--sidebar-color); }
        
        /* HEATMAP */
        .heatmap-cell { width: 12px; height: 12px; border-radius: 2px; background: rgba(0,0,0,0.05); transition: 0.3s; }
        .heatmap-cell.level-1 { background: #d4a5a5; opacity: 0.3; }
        .heatmap-cell.level-2 { background: #d4a5a5; opacity: 0.6; }
        .heatmap-cell.level-3 { background: #d4a5a5; opacity: 1; box-shadow: 0 0 10px rgba(212, 165, 165, 0.5); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="showView('tasks', this)"><span>📋</span> <span class="nav-text">Задачи</span></div>
        <div class="nav-item" onclick="showView('backlog', this)"><span>🗂️</span> <span class="nav-text">Бэклог</span></div>
        <div class="nav-item" onclick="showView('analytics', this)"><span>📊</span> <span class="nav-text">Аналитика</span></div>
        <div class="nav-item" onclick="showView('archive', this)"><span>📦</span> <span class="nav-text">Архив</span></div>
        <div class="nav-item export-btn" onclick="exportDB()"><span>💾</span> <span class="nav-text">Экспорт БД</span></div>
    </div>

    <div class="main-content-wrapper">
        <div class="workspace">
            <div id="tasks-view" class="view-content active-view">
                <div id="morning-greeting" style="display:none; background: linear-gradient(90deg, var(--accent-rose), #e6baba); color: white; padding: 18px 30px; border-radius: 25px; margin-bottom: 25px; font-size: 15px; box-shadow: 0 15px 30px rgba(212, 165, 165, 0.3); border: 1px solid rgba(255,255,255,0.2);">
                    <span id="greeting-text">Доброе утро, Полина! ✨</span>
                </div>
                <h1>Фокус дня</h1>
                <div class="task-input-row">
                    <div style="position:relative; flex:1; display:flex; align-items:center;">
                        <input type="text" id="task-name-quick" placeholder="Что нужно сделать?" onkeypress="if(event.key==='Enter')addTaskQuick()" style="padding-right: 45px; width: 100%;">
                        <span id="voice-btn" onclick="startVoiceInput()" style="position:absolute; right:15px; cursor:pointer; font-size:18px; opacity:0.4; transition:0.3s;">🎤</span>
                    </div>
                    <button class="btn-add" onclick="addTaskQuick()">быстро добавить задачу</button>
                </div>
                <div style="display:flex; gap: 30px; flex: 1; overflow-x: auto; padding-bottom: 20px;">
                    <div style="flex:1; min-width: 280px;"><h2>СЕГОДНЯ</h2><div id="list-today" class="task-list" data-type="today"></div></div>
                    <div style="flex:1; min-width: 280px;"><h2>БАЛАНС / ЛИЧНОЕ</h2><div id="list-balance" class="task-list" data-type="personal"></div></div>
                    <div style="flex:1; min-width: 280px;"><h2>МЕЧТЫ</h2><div id="list-dreams" class="task-list" data-type="dream"></div></div>
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: center;"><button class="btn-pro" onclick="openProModal()">добавить задачу</button></div>
            </div>
            
            <div id="backlog-view" class="view-content">
                <h1>Бэклог</h1>
                <div style="display:flex; gap: 30px; margin-top:20px; flex: 1; overflow-x: auto;">
                    <div style="flex:1; min-width: 300px;">
                        <h2>БЛИЖАЙШИЕ (7 дней)</h2>
                        <div id="list-backlog-soon" class="task-list" data-type="backlog_soon"></div>
                    </div>
                    <div style="flex:1; min-width: 300px;">
                        <h2>КОГДА-НИБУДЬ</h2>
                        <div id="list-backlog-later" class="task-list" data-type="backlog_later"></div>
                    </div>
                </div>
            </div>

            <div id="analytics-view" class="view-content">
                <h1>Активность</h1>
                <div id="heatmap-container" style="margin-bottom: 30px; background: rgba(255,255,255,0.4); backdrop-filter: blur(10px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); overflow-x: auto;">
                    <div id="heatmap" style="display: flex; gap: 5px;"></div>
                    <div style="display:flex; justify-content: space-between; margin-top: 10px; font-size: 10px; color: #888;">
                        <span>12 недель назад</span>
                        <span>Сегодня</span>
                    </div>
                </div>
                <h1>Вес</h1><div class="chart-container"><canvas id="weightChart"></canvas></div>
                <h1>Продуктивность</h1><div class="chart-container"><canvas id="tasksChart"></canvas></div>
            </div>

            <div id="archive-view" class="view-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h1>Архив задач</h1>
                    <input type="text" id="archive-search" placeholder="Поиск в архиве..." oninput="searchArchive()" style="padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); font-size: 13px; width: 300px; background: rgba(255,255,255,0.6);">
                </div>
                <div id="list-archived" class="task-list"></div>
            </div>
        </div>
        <div class="resizer" id="panel-resizer"></div>
        <div class="insights-panel" id="insights-panel">
            <div class="widget">
                <div class="item-header"><h2>ТЕЛО</h2><span class="small-icon" onclick="promptMetrics()">✏️</span></div>
                <div id="body-text" style="font-size: 18px; font-weight: 300; color: #444; margin-bottom: 10px;">Загрузка...</div>
                <div class="status-grid ferris-grid" id="ferris-grid"></div>
            </div>
            <div class="widget"><div class="item-header"><h2>ЗАКАЗЫ</h2><span class="small-icon" onclick="promptClient()">+</span></div><div id="clients-list"></div></div>
            <div class="widget"><div class="item-header"><h2>УЧЕБА</h2><span class="small-icon" onclick="promptCounter()">+</span></div><div id="study-list"></div></div>
        </div>
    </div>

    <!-- CALENDAR -->
    <div id="custom-calendar">
        <div class="cal-header"><span onclick="prevMonth()" style="cursor:pointer">‹</span><span id="cal-month-year">...</span><span onclick="nextMonth()" style="cursor:pointer">›</span><span onclick="closeCalendar()" style="cursor:pointer; color:#aaa; margin-left:10px">✕</span></div>
        <div class="cal-grid" id="cal-days-grid"></div>
    </div>

    <div id="pro-modal" class="modal-overlay" onclick="closeProModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="modal-title" style="color: var(--sidebar-color); margin-bottom: 10px;">Новая задача</h3>
            <div style="display:flex; flex-direction:column; gap:5px;"><label>НАЗВАНИЕ</label><input type="text" id="pro-name" placeholder="Что нужно сделать?"></div>
            <div style="display:flex; flex-direction:column; gap:5px;"><label>ОПИСАНИЕ / ССЫЛКИ</label><textarea id="pro-desc" placeholder="Дополнительная информация" rows="3"></textarea></div>
            <div style="display:flex; gap:15px">
                <div style="flex:1; display:flex; flex-direction:column; gap:5px;"><label>КАТЕГОРИЯ</label><select id="pro-category"><option value="work">Рабочее</option><option value="personal">Личное</option><option value="dream">Мечты</option></select></div>
            </div>
            <div style="display:flex; gap:15px">
                <div style="flex:1; display:flex; flex-direction:column; gap:5px;"><label>СТАРТ</label><input type="date" id="pro-start"></div>
                <div style="flex:1; display:flex; flex-direction:column; gap:5px;"><label>ДЕДЛАЙН</label><input type="date" id="pro-due"></div>
            </div>
            <button class="btn-add" id="modal-submit" onclick="saveTask()" style="width:100%; padding: 18px; margin-top: 10px; border-radius: 18px; font-size: 15px; letter-spacing: 1px;">СОХРАНИТЬ</button>
        </div>
    </div>

    <script>
        let currentInsights = {}, allTasks = [], archivedTasks = [], weightChart, tasksChart, activeTaskId = null, calDate = new Date(), editingTaskId = null, heatmapData = {};

        async function loadAll() {
            try {
                const [tRes, arcRes, insRes, histRes] = await Promise.all([
                    fetch('/api/tasks'),
                    fetch('/api/tasks/archived'),
                    fetch('/api/insights'),
                    fetch('/api/history')
                ]);
                
                allTasks = await tRes.json();
                archivedTasks = await arcRes.json();
                currentInsights = await insRes.json();
                const history = await histRes.json();
                heatmapData = history.heatmap;
                
                renderTasks(allTasks);
                renderArchive(archivedTasks);
                renderInsights();
                checkMorningGreeting();
                if (document.getElementById('analytics-view').classList.contains('active-view')) {
                    updateCharts(history);
                }
            } catch(e) { console.error("Critical Load Failure", e); }
        }

        function renderTasks(tasks) {
            const lists = {
                today: document.getElementById('list-today'),
                personal: document.getElementById('list-balance'),
                dream: document.getElementById('list-dreams'),
                backlogSoon: document.getElementById('list-backlog-soon'),
                backlogLater: document.getElementById('list-backlog-later')
            };
            Object.values(lists).forEach(l => { if(l) l.innerHTML = ''; });
            const now = new Date(); now.setHours(0,0,0,0);
            const nextWeek = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

            tasks.forEach(t => {
                const linkified = (t.name || "").replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent-blue); pointer-events:auto; text-decoration:none; font-weight:600;">🔗 ссылка</a>');
                const html = `
                    <div class="task-card" data-id="${t.id}">
                        <div class="task-info">
                            <input type="checkbox" ${t.completed?'checked':''} onclick="completeTask(${t.id}, this)" style="width: 18px; height: 18px; cursor:pointer;">
                            <div style="display:flex; flex-direction:column; margin-left: 5px;">
                               <span style="font-size:14px; font-weight:500; color: #333;">${linkified}</span>
                               ${t.due_date ? `<span style="font-size:10px; color:var(--accent-blue); margin-top:2px;">📅 ${t.due_date}</span>` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <span class="action-icon" onclick="startEdit(${t.id})">✏️</span>
                            <span class="action-icon" onclick="toggleCalendar(event, ${t.id})">📅</span>
                            <span class="action-icon" onclick="archiveTask(${t.id})">📦</span>
                        </div>
                    </div>`;

                const d = t.due_date ? new Date(t.due_date) : null;
                if(d) d.setHours(0,0,0,0);

                if (t.is_dream) lists.dream.innerHTML += html;
                else if (d && d > now) {
                    if (d <= nextWeek) lists.backlogSoon.innerHTML += html;
                    else lists.backlogLater.innerHTML += html;
                }
                else if (t.is_personal) lists.personal.innerHTML += html;
                else lists.today.innerHTML += html;
            });
            initSortable();
        }

        function initSortable() {
            ['list-today', 'list-balance', 'list-dreams', 'list-backlog-soon', 'list-backlog-later'].forEach(id => {
                const el = document.getElementById(id);
                if (el && !el._sortable) {
                    el._sortable = new Sortable(el, { group: 'tasks', animation: 200, ghostClass: 'sortable-ghost', onEnd: async function(evt) {
                        const taskId = evt.item.dataset.id; const toType = evt.to.dataset.type; await updateTaskType(taskId, toType);
                    }});
                }
            });
        }

        async function updateTaskType(taskId, type) {
            let params = new URLSearchParams();
            if (type === 'dream') params.append('is_dream', 'true');
            else if (type === 'personal') params.append('is_personal', 'true');
            else if (type === 'today') { params.append('is_dream', 'false'); params.append('is_personal', 'false'); }
            await fetch(`/api/tasks/${taskId}?${params.toString()}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: taskId}) });
            loadAll();
        }

        function renderArchive(tasks) {
            const list = document.getElementById('list-archived'); if(!list) return;
            const searchInput = document.getElementById('archive-search'); const search = searchInput ? searchInput.value.toLowerCase() : '';
            const filtered = tasks.filter(t => t.name.toLowerCase().includes(search));
            list.innerHTML = filtered.length ? filtered.map(t => `<div class="task-card" style="cursor:default; opacity:0.7;"><span style="font-size:13px; color:#666">${t.name}</span><span class="action-icon" style="filter:none;" onclick="restoreTask(${t.id})">🔄</span></div>`).join('') : '<div style="text-align:center; color:#999; padding:40px;">Задач не найдено</div>';
        }

        function searchArchive() { renderArchive(archivedTasks); }

        function startVoiceInput() {
            const btn = document.getElementById('voice-btn'); const input = document.getElementById('task-name-quick');
            if (!('webkitSpeechRecognition' in window)) { alert("Голосовой ввод не поддерживается вашим браузером. Попробуйте Chrome."); return; }
            const recognition = new webkitSpeechRecognition(); recognition.lang = 'ru-RU';
            recognition.onstart = () => { btn.innerText = '🔴'; btn.style.opacity = '1'; };
            recognition.onresult = (event) => { const text = event.results[0][0].transcript; input.value = text; if(text) setTimeout(addTaskQuick, 800); };
            recognition.onend = () => { btn.innerText = '🎤'; btn.style.opacity = '0.4'; };
            recognition.start();
        }

        function checkMorningGreeting() {
            const now = new Date(); const hour = now.getHours(); const greeting = document.getElementById('morning-greeting'); const text = document.getElementById('greeting-text');
            if (hour >= 5 && hour <= 11) {
                const dayNames = ["воскресенье", "понедельник", "вторник", "среду", "четверг", "пятницу", "субботу"];
                const todayName = dayNames[now.getDay()];
                let contextHint = "Хорошего начала дня!";
                const pendingFreud = allTasks.filter(t => t.name.toLowerCase().includes('фрейд') && !t.completed).length;
                if(pendingFreud) contextHint = "Сегодня отличное время для Фрейда. Удачи с чтением!";
                text.innerText = `Доброе утро, Полина! ✨ Прекрасный день, чтобы покорить эту ${todayName}. ${contextHint}`;
                greeting.style.display = 'block';
            } else { greeting.style.display = 'none'; }
        }

        function renderInsights() {
            if(currentInsights.body) {
                document.getElementById('body-text').innerText = `${currentInsights.body.weight || 53.75} кг | ${currentInsights.body.waist || 61} см`;
                const fGrid = document.getElementById('ferris-grid');
                fGrid.innerHTML = (currentInsights.body.workout_history || []).map((d, i) => `<div class="status-block ${d?'rose':''}" onclick="toggleWorkout(${i})">${i+1}</div>`).join('');
            } else { document.getElementById('body-text').innerText = "Данные не введены"; }

            document.getElementById('clients-list').innerHTML = (currentInsights.clients || []).map(c => {
                let blks = ''; for(let i=1; i<=c.stages_total; i++) blks += `<div class="status-block ${i<=c.stages_done?'active':''}" onclick="toggleClient(${c.id}, ${i})">${i}</div>`;
                return `<div class="widget" style="gap:5px"><div class="sub-header"><span>${c.name}</span><span class="small-icon" onclick="archiveClient(${c.id})">✕</span></div><div class="status-grid">${blks}</div></div>`;
            }).join('');

            document.getElementById('study-list').innerHTML = (currentInsights.counters || []).map(s => {
                let blks = ''; const isF = s.name.toLowerCase().includes('фрейд'); const target = isF ? 35 : s.target;
                for(let i=1; i<=target; i++) blks += `<div class="status-block ${i<=s.value?'rose':''}" onclick="toggleCounter(${s.id}, ${i})">${i}</div>`;
                return `<div class="widget" style="gap:5px"><div class="sub-header"><span>${s.name}</span><span class="small-icon" onclick="deleteCounter(${s.id})">✕</span></div><div class="status-grid ${isF?'freud-grid':''}">${blks}</div></div>`;
            }).join('');
        }

        async function addTaskQuick() { const n = document.getElementById('task-name-quick').value; if(n) { await fetch('/api/tasks?name='+encodeURIComponent(n), {method:'POST'}); document.getElementById('task-name-quick').value=''; loadAll(); } }
        async function completeTask(id, el) { el.closest('.task-card').style.opacity = '0.3'; await fetch(`/api/tasks/${id}/toggle`, {method:'POST'}); setTimeout(async () => { await fetch(`/api/tasks/${id}/archive`, {method:'POST'}); loadAll(); }, 500); }
        async function archiveTask(id) { await fetch(`/api/tasks/${id}/archive`, {method:'POST'}); loadAll(); }
        async function restoreTask(id) { await fetch(`/api/tasks/${id}/restore`, {method:'POST'}); loadAll(); }
        
        function startEdit(id) { 
            editingTaskId = id; const t = allTasks.find(x => x.id === id); 
            if(t) { 
                document.getElementById('modal-title').innerText = "Редактировать задачу";
                document.getElementById('pro-name').value = t.name; document.getElementById('pro-desc').value = t.description || ''; 
                document.getElementById('pro-category').value = t.is_dream ? 'dream' : (t.is_personal ? 'personal' : 'work');
                document.getElementById('pro-start').value = t.start_date || ''; document.getElementById('pro-due').value = t.due_date || '';
                document.getElementById('pro-modal').style.display = 'flex'; 
            } 
        }

        async function saveTask() {
            const n = document.getElementById('pro-name').value; const d = document.getElementById('pro-desc').value; const cat = document.getElementById('pro-category').value; const start = document.getElementById('pro-start').value; const due = document.getElementById('pro-due').value;
            if(!n) { alert("Название обязательно"); return; }
            const params = new URLSearchParams({ name: n, description: d, is_dream: cat === 'dream', is_personal: cat === 'personal' });
            if(start) params.append('start_date', start); if(due) params.append('due_date', due);
            const url = editingTaskId ? `/api/tasks/${editingTaskId}?${params.toString()}` : `/api/tasks?${params.toString()}`;
            const method = editingTaskId ? 'PUT' : 'POST';
            await fetch(url, { method: method }); closeProModal(); loadAll();
        }

        function closeProModal() { document.getElementById('pro-modal').style.display = 'none'; editingTaskId = null; }
        function openProModal() { editingTaskId = null; document.getElementById('modal-title').innerText = "Новая задача"; document.getElementById('pro-name').value=''; document.getElementById('pro-desc').value=''; document.getElementById('pro-start').value=''; document.getElementById('pro-due').value=''; document.getElementById('pro-modal').style.display='flex'; }

        async function promptMetrics() {
            const w = prompt("Вес (кг):", currentInsights.body ? currentInsights.body.weight : 53.75); 
            const wa = prompt("Талия (см):", currentInsights.body ? currentInsights.body.waist : 61);
            if(w !== null && wa !== null) { await fetch(`/api/body/metrics?weight=${w}&waist=${wa}&hips=89&chest=85`, {method:'POST'}); loadAll(); }
        }

        async function promptClient() { const n = prompt("Название заказа:"); if(n) { await fetch('/api/client?name='+encodeURIComponent(n), {method:'POST'}); loadAll(); } }
        async function promptCounter() { const n = prompt("Название предмета:"); const t = prompt("Цель (кол-во):", 10); if(n&&t) { await fetch(`/api/counter?name=${encodeURIComponent(n)}&target=${t}`, {method:'POST'}); loadAll(); } }
        async function toggleWorkout(idx) { await fetch(`/api/body/workout?day_index=${idx}`, {method:'POST'}); loadAll(); }
        async function toggleClient(id, idx) { await fetch(`/api/client/${id}/toggle?stage_idx=${idx}`, {method:'POST'}); loadAll(); }
        async function toggleCounter(id, val) { await fetch(`/api/counter/${id}/set?value=${val}`, {method:'POST'}); loadAll(); }
        async function archiveClient(id) { if(confirm("В архив?")) { await fetch(`/api/client/${id}`, {method:'DELETE'}); loadAll(); } }
        async function deleteCounter(id) { if(confirm("Удалить?")) { await fetch(`/api/counter/${id}`, {method:'DELETE'}); loadAll(); } }
        function exportDB() { window.location.href = '/api/export'; setTimeout(() => { alert("Экспортировано. Файл planner.db сохранен."); }, 1000); }

        function showView(v, el) { 
            document.querySelectorAll('.view-content').forEach(x => x.classList.remove('active-view')); document.getElementById(v+'-view').classList.add('active-view'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); 
            loadAll(); 
        }

        async function updateCharts(d) {
            if(!d) { const res = await fetch('/api/history'); d = await res.json(); heatmapData = d.heatmap; }
            if(weightChart) weightChart.destroy(); if(tasksChart) tasksChart.destroy();
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }, scales: { y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.02)' } }, x: { grid: { display: false } } } };
            
            weightChart = new Chart(document.getElementById('weightChart').getContext('2d'), { 
                type: 'line', data: { labels: d.body.dates, datasets: [ { label: 'Вес (кг)', data: d.body.weight, borderColor: '#d4a5a5', backgroundColor: 'rgba(212, 165, 165, 0.1)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fff', borderWeight: 3 }, { label: 'Цель (56кг)', data: d.body.target, borderColor: 'rgba(122, 148, 181, 0.5)', borderDash: [5, 5], fill: false, pointRadius: 0 } ] }, options: opt 
            });
            tasksChart = new Chart(document.getElementById('tasksChart').getContext('2d'), { 
                type: 'line', data: { labels: d.tasks.dates, datasets: [ { label: 'Рабочее (%)', data: d.tasks.work, borderColor: '#7a94b5', tension: 0.4, fill: false, borderWeight: 3 }, { label: 'Личное (%)', data: d.tasks.personal, borderColor: '#d4a5a5', tension: 0.4, fill: false, borderWeight: 3 } ] }, options: opt 
            });
            renderHeatmap();
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmap'); container.innerHTML = '';
            const today = new Date(); today.setHours(0,0,0,0);
            for(let i=0; i<12; i++) {
                let column = document.createElement('div'); column.style.display = 'flex'; column.style.flexDirection = 'column'; column.style.gap = '5px';
                for(let j=0; j<7; j++) {
                    const dayOffset = (11 - i) * 7 + (6 - j);
                    const date = new Date(today); date.setDate(today.getDate() - dayOffset);
                    const dateStr = date.toISOString().split('T')[0];
                    const count = heatmapData[dateStr] || 0;
                    let cell = document.createElement('div'); cell.className = 'heatmap-cell';
                    if(count > 0) cell.classList.add(count > 3 ? 'level-3' : (count > 1 ? 'level-2' : 'level-1'));
                    cell.title = `${dateStr}: ${count} задач`;
                    column.appendChild(cell);
                }
                container.appendChild(column);
            }
        }

        let currentCalMonth = new Date().getMonth(); let currentCalYear = new Date().getFullYear();
        function toggleCalendar(e, id) { activeTaskId = id; const cal = document.getElementById('custom-calendar'); const rect = e.target.getBoundingClientRect(); cal.style.left = Math.min(window.innerWidth - 300, rect.left - 120) + 'px'; cal.style.top = (rect.bottom + window.scrollY + 10) + 'px'; cal.style.display = 'block'; renderCal(); }
        function closeCalendar() { document.getElementById('custom-calendar').style.display = 'none'; }
        function prevMonth() { currentCalMonth--; if(currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; } renderCal(); }
        function nextMonth() { currentCalMonth++; if(currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; } renderCal(); }
        function renderCal() {
            const grid = document.getElementById('cal-days-grid'); const monthNames = ["ЯНВАРЬ", "ФЕВРАЛЬ", "МАРТ", "АПРЕЛЬ", "МАЙ", "ИЮНЬ", "ИЮЛЬ", "АВГУСТ", "СЕНТЯБРЬ", "ОКТЯБРЬ", "НОЯБРЬ", "ДЕКАБРЬ"];
            document.getElementById('cal-month-year').innerText = `${monthNames[currentCalMonth]} ${currentCalYear}`; grid.innerHTML = '';
            const firstDay = new Date(currentCalYear, currentCalMonth, 1).getDay(); const daysInMonth = new Date(currentCalYear, currentCalMonth + 1, 0).getDate();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<startOffset; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=daysInMonth; d++) { const dateStr = `${currentCalYear}-${String(currentCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; grid.innerHTML += `<div class="cal-day" onclick="setTaskDate('${dateStr}')">${d}</div>`; }
        }
        async function setTaskDate(dateStr) { await fetch(`/api/tasks/${activeTaskId}/dates?due_date=${dateStr}`, { method: 'POST' }); closeCalendar(); loadAll(); }
        const resizer = document.getElementById('panel-resizer'); const panel = document.getElementById('insights-panel'); let isResizing = false;
        resizer.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; resizer.classList.add('dragging'); });
        document.addEventListener('mousemove', (e) => { if (!isResizing) return; const width = window.innerWidth - e.clientX; if (width > 250 && width < 600) { panel.style.width = `${width}px`; } });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; resizer.classList.remove('dragging'); });

        window.onload = loadAll;
    </script>
</body>
