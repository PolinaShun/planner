<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планы Полины</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; padding: 40px 20px; min-height: 100vh; color: #1a1a1a; }
        .container { max-width: 800px; margin: 0 auto; }
        .paper { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 24px; position: relative; }
        .header { padding: 48px 56px 32px; border-bottom: 1px solid #e5e5e5; position: relative; }
        .header-top { font-size: 13px; color: #6b7280; margin-bottom: 16px; letter-spacing: 0.5px; }
        .header-title { font-size: 42px; font-weight: 700; line-height: 1.1; letter-spacing: -1px; margin-bottom: 12px; }
        .stats-row { display: flex; gap: 40px; margin-top: 24px; padding-top: 24px; border-top: 1px solid #f0f0f0; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
        .btn-red-top { position: absolute; top: 40px; right: 56px; background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); z-index: 10; }
        .main-tabs { display: flex; border-bottom: 2px solid #e5e5e5; }
        .main-tab { flex: 1; padding: 16px; text-align: center; font-size: 14px; font-weight: 600; color: #9ca3af; cursor: pointer; border: none; background: none; transition: 0.2s; position: relative; }
        .main-tab.active { color: #1a1a1a; }
        .main-tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #1a1a1a; }
        .tab-count { display: inline-block; background: #e5e5e5; color: #6b7280; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
        .main-tab.active .tab-count { background: #1a1a1a; color: white; }
        .time-filters { display: flex; gap: 8px; padding: 24px 56px; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
        .time-btn { padding: 8px 20px; border: 1px solid #e5e5e5; background: white; border-radius: 20px; font-size: 13px; color: #6b7280; cursor: pointer; }
        .time-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: white; }
        .content { padding: 24px 56px 40px; }
        
        .quick-input-group { padding: 0 56px 20px; border-bottom: 1px solid #f0f0f0; margin-top: 20px; }
        .quick-input { width: 100%; padding: 12px 16px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .quick-input:focus { border-color: #1a1a1a; }

        .task-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #9ca3af; margin: 24px 0 12px; }
        .task-list { list-style: none; }
        .task-item { display: flex; gap: 16px; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; border-radius: 8px; margin-bottom: 4px; transition: background 0.2s; }
        .task-item:hover { background: #fafafa; }
        .task-item.personal { background: #fdf2f2; border-color: #fee2e2; } /* Pastel peach/rose */
        .task-item.work { background: #f0fff4; border-color: #c6f6d5; } /* Pastel green */
        
        .task-item.completed .task-name { text-decoration: line-through; opacity: 0.5; }
        .task-check { width: 22px; height: 22px; border: 2px solid #e5e5e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: 2px; flex-shrink: 0; background: white; }
        .task-item.completed .task-check { background: #1a1a1a; border-color: #1a1a1a; }
        .task-item.completed .task-check::after { content: '✓'; color: white; font-size: 13px; }
        .task-name { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
        .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .task-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; background: #eee; }
        .tag-p0 { background: #fee2e2; color: #dc2626; }
        .task-date { font-size: 11px; color: #ef4444; font-weight: 600; }
        
        .subtasks { margin-top: 10px; padding-left: 38px; }
        .subtask-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #6b7280; padding: 4px 0; }
        .subtask-check { width: 14px; height: 14px; border: 1px solid #d1d5db; border-radius: 3px; }
        .subtask-item.completed .subtask-text { text-decoration: line-through; opacity: 0.7; }

        .progress-tab { display: none; padding: 32px 56px; }
        .progress-tab.active { display: block; }
        .progress-card { background: #fafafa; border-radius: 10px; padding: 24px; margin-bottom: 16px; border: 1px solid #f0f0f0; }
        .tick-bar { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .tick { width: 24px; height: 24px; border-radius: 4px; background: #e5e5e5; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 10px; font-weight: 700; }
        .tick.filled.purple { background: #8b5cf6; color: white; }
        .tick.filled.blue { background: #3b82f6; color: white; }
        .tick.filled.amber { background: #f59e0b; color: white; }
        .tick.filled.rose { background: #ec4899; color: white; }
        .tick.filled.green { background: #10b981; color: white; }
        .metrics-row { display: flex; gap: 12px; margin-top: 12px; }
        .metric-item { flex: 1; background: #fff; border-radius: 8px; padding: 16px; text-align: center; border: 1px solid #eee; cursor: pointer; }
        .metric-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; }
        .metric-value { font-size: 22px; font-weight: 700; }
        .order-stages { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .order-dot { width: 18px; height: 18px; border-radius: 3px; background: #e5e5e5; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .order-dot.done { background: #10b981; border-color: #10b981; }
        .btn { padding: 10px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e5e5e5; background: white; }
        .btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 14px 24px; border-radius: 6px; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 1000; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <div class="paper">
        <button class="btn-red-top" onclick="exportData()">ЭКСПОРТ</button>
        <div class="header">
            <div class="header-top" id="currentWeek">загрузка недели...</div>
            <h1 class="header-title">ТЫ УЖЕ МНОГОЕ<br>СДЕЛАЛА.<br>ПРОСТО ЗАБЫЛА.</h1>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего</div></div>
                <div class="stat-item"><div class="stat-value" id="statDone">0</div><div class="stat-label">Готово</div></div>
                <div class="stat-item"><div class="stat-value" id="statTodo">0</div><div class="stat-label">Осталось</div></div>
                <div class="stat-item"><div class="stat-value" id="statProgress">0%</div><div class="stat-label">Прогресс</div></div>
            </div>
        </div>
        <div class="main-tabs">
            <button class="main-tab active" id="tabTasks" onclick="switchTab('tasks')">Задачи <span class="tab-count" id="taskCount">0</span></button>
            <button class="main-tab" id="tabProgress" onclick="switchTab('progress')">Прогресс <span class="tab-count" id="progressCount">0</span></button>
        </div>
        
        <div id="tasksTab">
            <div class="quick-input-group">
                <input type="text" class="quick-input" id="quickInput" placeholder="Что нужно сделать? (напр: до 28.04 Написать пост)" onkeydown="handleQuickAdd(event)">
            </div>
            <div class="time-filters">
                <button class="time-btn active" onclick="filterSlot(null, this)">Все</button>
                <button class="time-btn" onclick="filterSlot('Сегодня', this)">Сегодня</button>
                <button class="time-btn" onclick="filterSlot('Завтра', this)">Завтра</button>
                <button class="time-btn" onclick="filterSlot('На неделе', this)">На неделе</button>
                <button class="time-btn" onclick="filterSlot('Архив', this)" style="border-style:dashed; margin-left:auto">Архив</button>
            </div>
            <div class="content">
                <div id="workSection">
                    <div class="task-section-title">💼 В работе</div>
                    <ul class="task-list" id="workTaskList"></ul>
                </div>
                <div id="personalSection">
                    <div class="task-section-title">🏠 Личное и забота</div>
                    <ul class="task-list" id="personalTaskList"></ul>
                </div>
                
                <div style="margin-top:24px; display:flex; gap:10px">
                    <button class="btn btn-primary" onclick="smartArchive()">✨ ПОДВЕСТИ ИТОГИ</button>
                </div>
            </div>
        </div>

        <div class="progress-tab" id="progressTab">
            <!-- Progress content will be loaded here via JS -->
            <div id="progressContent"></div>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
let tasks = [];
let progressData = {};
let selectedTimeSlot = null;

async function api(path, method = 'GET', body = null) {
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(path, options);
    return res.json();
}

async function loadData() {
    tasks = await api('/api/tasks/');
    progressData = await api('/api/stats/progress');
    render();
}

function render() {
    const workList = document.getElementById('workTaskList');
    const personalList = document.getElementById('personalTaskList');
    
    let filtered = tasks.filter(t => selectedTimeSlot === 'Архив' ? t.archived : !t.archived);
    if (selectedTimeSlot && selectedTimeSlot !== 'Архив') {
        filtered = filtered.filter(t => t.timeSlot === selectedTimeSlot);
    }

    const renderTask = t => `
        <li class="task-item ${t.completed?'completed':''} ${t.is_personal?'personal':'work'}" onclick="toggleTask(${t.id})">
            <div class="task-check"></div>
            <div class="task-body" style="flex:1">
                <div class="task-name">${t.name}</div>
                <div class="task-meta">
                    <span class="task-tag tag-${t.priority}">${t.priority}</span>
                    ${t.due_date ? `<span class="task-date">📅 до ${new Date(t.due_date).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'})}</span>` : ''}
                    <button onclick="event.stopPropagation(); cycleSlot(${t.id})" style="background:none; border:1px solid rgba(0,0,0,0.1); border-radius:10px; font-size:10px; padding:2px 8px; color:#9ca3af; cursor:pointer">${t.time_slot} ⇄</button>
                    <button onclick="event.stopPropagation(); togglePersonal(${t.id})" style="background:none; border:1px solid rgba(0,0,0,0.1); border-radius:10px; font-size:10px; padding:2px 8px; color:#9ca3af; cursor:pointer">${t.is_personal?'💼':'🏠'}</button>
                </div>
                ${t.subtasks && t.subtasks.length ? `
                    <div class="subtasks">
                        ${t.subtasks.map((s, idx) => `
                            <div class="subtask-item ${s.completed?'completed':''}" onclick="event.stopPropagation(); toggleSubtask(${t.id}, ${idx})">
                                <div class="subtask-check" style="background:${s.completed?'#1a1a1a':'none'}"></div>
                                <div class="subtask-text">${s.name}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
        </li>
    `;

    workList.innerHTML = filtered.filter(t => !t.is_personal).map(renderTask).join('');
    personalList.innerHTML = filtered.filter(t => t.is_personal).map(renderTask).join('');

    // Stats
    const activeTasks = tasks.filter(t => !t.archived);
    const done = activeTasks.filter(t => t.completed).length;
    document.getElementById('statTotal').textContent = activeTasks.length;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statTodo').textContent = activeTasks.length - done;
    document.getElementById('statProgress').textContent = (activeTasks.length ? Math.round((done/activeTasks.length)*100) : 0) + '%';
    document.getElementById('taskCount').textContent = activeTasks.filter(t=>!t.completed).length;
    
    renderProgress();
}

function renderProgress() {
    const container = document.getElementById('progressContent');
    const { clients, counters, metrics } = progressData;
    
    if (!clients) return;

    container.innerHTML = `
        <div class="progress-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px"><b>💰 Консультации (Заглушка)</b></div>
            <div style="font-weight:700">Эта часть будет привязана к финансам позже</div>
        </div>
        
        <div class="progress-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px"><b>🏋️‍♀️ Тело (Феррис)</b></div>
            <div class="metrics-row">
                <div class="metric-item"><div class="metric-label">ВЕС</div><div class="metric-value">${metrics?.weight || '-'}</div></div>
                <div class="metric-item"><div class="metric-label">ТАЛИЯ</div><div class="metric-value">${metrics?.waist || '-'}</div></div>
                <div class="metric-item"><div class="metric-label">БЁДРА</div><div class="metric-value">${metrics?.hips || '-'}</div></div>
            </div>
        </div>

        <div class="progress-card">
            <b>📝 Заказы (Клиенты)</b>
            <div id="ordersGrid" style="margin-top:12px">
                ${clients.map(c => `
                    <div style="margin-bottom:12px">
                        <div style="display:flex; justify-content:space-between">
                            <span>${c.name}</span>
                            <small style="color:#9ca3af">${c.stages_done}/${c.stages_total}</small>
                        </div>
                        <div class="order-stages">
                            ${Array.from({length: c.stages_total}).map((_, i) => `
                                <div class="order-dot ${i < c.stages_done ? 'done' : ''}">${i < c.stages_done ? '✓' : ''}</div>
                            `).join('')}
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>

        <div class="progress-card">
            <b>🎓 Учёба</b>
            <div style="margin:12px 0 8px">Фрейд (${counters.freud.value}/${counters.freud.target})</div>
            <div class="tick-bar">${renderTicks(counters.freud, 'purple')}</div>
            <div style="margin:12px 0 8px">Мак-Вильямс (${counters.nancy.value}/${counters.nancy.target})</div>
            <div class="tick-bar">${renderTicks(counters.nancy, 'blue')}</div>
        </div>

        <div class="progress-card">
            <b>📱 Контент</b>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px">
                <div><small>ТГ</small><div class="tick-bar">${renderTicks(counters.tg, 'rose')}</div></div>
                <div><small>РИЛС</small><div class="tick-bar">${renderTicks(counters.reels, 'rose')}</div></div>
            </div>
        </div>
    `;
}

function renderTicks(counter, color) {
    return Array.from({length: counter.target}).map((_, i) => `
        <div class="tick ${i < counter.value ? 'filled ' + color : ''}"></div>
    `).join('');
}

async function handleQuickAdd(e) {
    if (e.key === 'Enter' && e.target.value.trim()) {
        const val = e.target.value;
        await api('/api/tasks/', 'POST', { name: val });
        e.target.value = '';
        await loadData();
        showToast('✅ Добавлено');
    }
}

async function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    await api(`/api/tasks/${id}`, 'PATCH', { completed: !t.completed });
    await loadData();
}

async function togglePersonal(id) {
    const t = tasks.find(x => x.id === id);
    await api(`/api/tasks/${id}`, 'PATCH', { is_personal: !t.is_personal });
    await loadData();
}

async function cycleSlot(id) {
    const t = tasks.find(x => x.id === id);
    const slots = ['Сегодня', 'Завтра', 'На неделе'];
    const next = slots[(slots.indexOf(t.time_slot) + 1) % slots.length];
    await api(`/api/tasks/${id}`, 'PATCH', { time_slot: next });
    await loadData();
}

async function smartArchive() {
    const res = await api('/api/tasks/smart-archive', 'POST');
    await loadData();
    showToast(`✨ ${res.stats.archived_count} задач архивировано!`);
}

function filterSlot(s, btn) {
    selectedTimeSlot = s;
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function switchTab(t) {
    document.getElementById('tasksTab').style.display = t === 'tasks' ? 'block' : 'none';
    document.getElementById('progressTab').style.display = t === 'progress' ? 'block' : 'none';
    document.getElementById('tabTasks').classList.toggle('active', t === 'tasks');
    document.getElementById('tabProgress').classList.toggle('active', t === 'progress');
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// Set current week
const now = new Date();
document.getElementById('currentWeek').textContent = `неделя ${now.toLocaleDateString('ru-RU')}`;

loadData();
</script>
</body>
</html>
